<!DOCTYPE html>
<html>
<head>
    <title>Currency Detection</title>
    <style>
        body {
            background-color: #0b1f3a;
            color: white;
            text-align: center;
            font-family: Arial;
        }

        video, img, canvas {
            margin-top: 20px;
            border-radius: 10px;
        }

        button, select, input {
            padding: 10px;
            margin: 10px;
            border-radius: 5px;
        }

        button {
            background-color: #1e90ff;
            color: white;
            border: none;
            cursor: pointer;
        }

        .section {
            margin-top: 30px;
        }
    </style>
</head>
<body>

<h1>Currency Detection App</h1>

<!-- Language Selection -->
<label>Select Language:</label>
<select id="language">
    <option value="en">English</option>
    <option value="ta">Tamil</option>
</select>

<hr>

<!-- CAMERA SECTION -->
<div class="section">
    <h2>📷 Live Camera</h2>
    <video id="video" width="300" autoplay></video><br>
    <button onclick="capture()">Capture & Detect</button>
</div>

<!-- FILE UPLOAD SECTION -->
<div class="section">
    <h2>📁 Upload Image</h2>
    <input type="file" id="fileInput">
    <button onclick="uploadFile()">Upload & Detect</button>
</div>

<canvas id="canvas" width="300" height="200" style="display:none;"></canvas>

<h3 id="result"></h3>

<script>
const video = document.getElementById("video");

// Start camera
navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => {
    video.srcObject = stream;
});

// Common function to speak
function speak(text, lang) {
    let speech = new SpeechSynthesisUtterance(text);
    speech.lang = lang;
    window.speechSynthesis.speak(speech);
}

// CAMERA CAPTURE
function capture() {
    const canvas = document.getElementById("canvas");
    const context = canvas.getContext("2d");

    context.drawImage(video, 0, 0, canvas.width, canvas.height);

    const dataURL = canvas.toDataURL("image/png");
    const language = document.getElementById("language").value;

    sendToServer(dataURL, language);
}

// FILE UPLOAD
function uploadFile() {
    const fileInput = document.getElementById("fileInput");
    const file = fileInput.files[0];

    if (!file) {
        alert("Please select an image");
        return;
    }

    const reader = new FileReader();

    reader.onload = function(e) {
        const dataURL = e.target.result;
        const language = document.getElementById("language").value;

        sendToServer(dataURL, language);
    };

    reader.readAsDataURL(file);
}

// SEND TO FLASK
function sendToServer(imageData, language) {
    fetch("/predict", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            image: imageData,
            language: language
        })
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("result").innerText = data.text;
        speak(data.text, data.lang);
    });
}
</script>

</body>
</html>
